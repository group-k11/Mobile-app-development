name: k11_project
description: "ShelfSense - Smart Retail Inventory & POS Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.5

  # Barcode scanning
  mobile_scanner: ^6.0.7

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.70.2

  # Formatting
  intl: ^0.20.2

  # Offline caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  http: ^1.2.1

  # PDF Receipts
  pdf: ^3.11.1
  printing: ^5.13.4
  path_provider: ^2.1.5
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
